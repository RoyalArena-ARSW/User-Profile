name: Deploy Profile to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'
    - name: Build with Maven
      run: mvn clean package -DskipTests
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: royalarenaregistry.azurecr.io
        username: ${{ secrets.AZURE_ACR_USERNAME }}
        password: ${{ secrets.AZURE_ACR_PASSWORD }}
    - name: Build and push Docker image
      run: |
        docker build -t royalarenaregistry.azurecr.io/profile-microservice:latest .
        docker push royalarenaregistry.azurecr.io/profile-microservice:latest